# Server
server.port=8080

# Database - Update these values for your PostgreSQL instance
spring.datasource.url=jdbc:postgresql://localhost:5432/student_risk_db
spring.datasource.username=pranavyuvarajr
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# App name
spring.application.name=student-risk-system
